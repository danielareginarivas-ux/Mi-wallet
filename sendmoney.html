<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Enviar Dinero</title>
    <button class="btn btn-danger">Teste Bootstrap</button>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-5">

        <div class="card p-4 shadow">

            <h2>Enviar Dinero</h2>
            <p>
                Estou aprendendo <abbr title=" hyper text markup language">HTML</abbr> e CSS
            </p>
            <p> <code></document.getElementbyid></code> Daniela regina ribeiro</p>
            <form>

                <div class="mb-3">
                    <label>Buscar contacto</label>
                    <input type="text" class="form-control">
                </div>

                <button type="button" class="btn btn-primary">
                    Buscar
                </button>

            </form>

            <button class="btn btn-success mt-3" data-bs-toggle="modal" data-bs-target="#nuevoContacto">

                Agregar nuevo contacto

            </button>

            <a href="menu.html" class="btn btn-secondary mt-3">
                Volver
            </a>

        </div>

    </div>

    <!-- Modal -->

    <div class="modal fade" id="nuevoContacto">

        <div class="modal-dialog">

            <div class="modal-content">

                <div class="modal-header">
                    <h5>Nuevo Contacto</h5>
                </div>

                <div class="modal-body">

                    <input type="text" class="form-control mb-2" placeholder="Nombre">

                    <input type="email" class="form-control" placeholder="Email">

                </div>

                <div class="modal-footer">

                    <button class="btn btn-success" data-bs-dismiss="modal">

                        Guardar

                    </button>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
